# Sleck API contract — Channels
#
# Domain: channels
# Version: 0.1.0
# Last updated by: Isabel
#
openapi: 3.0.3
info:
  title: Sleck Channels API
  version: 0.1.0
  description: |
    Baseline contract for channel listing and context endpoints.
    To be extended with channel CRUD as flows are implemented.
paths:
  /servers/{serverId}/channels:
    get:
      summary: List channels for a server
      operationId: listChannels
      tags: [channels]
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChannelSummary'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ChannelSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        isPrivate:
          type: boolean
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
