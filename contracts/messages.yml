# Sleck API contract — Messages
#
# Domain: messages
# Version: 0.1.0
# Last updated by: Isabel
#
openapi: 3.0.3
info:
  title: Sleck Messages API
  version: 0.1.0
  description: |
    Baseline contract for message listing endpoint.
    To be extended with send/edit/delete as flows are implemented.
paths:
  /channels/{channelId}/messages:
    get:
      summary: List messages in a channel
      operationId: listMessages
      tags: [messages]
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageSummary'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    MessageSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        content:
          type: string
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
