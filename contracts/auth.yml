# Sleck API contract — Auth
#
# Domain: auth
# Version: 0.1.0
# Last updated by: Isabel
#
openapi: 3.0.3
info:
  title: Sleck Auth API
  version: 0.1.0
  description: |
    Baseline contract for authentication context and identity endpoints.
    Covers login, logout, and auth context retrieval. To be extended as flows are implemented.
paths:
  /auth/context:
    get:
      summary: Get current authentication context
      operationId: getAuthContext
      tags: [auth]
      responses:
        '200':
          description: Auth context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthContext'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AuthContext:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        displayName:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
