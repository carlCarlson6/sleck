# Sleck API contract — Memberships & Invites
#
# Domain: memberships
# Version: 0.1.0
# Last updated by: Isabel
#
openapi: 3.0.3
info:
  title: Sleck Memberships API
  version: 0.1.0
  description: |
    Baseline contract for server membership and invite endpoints.
    To be extended with join/leave/invite flows as implemented.
paths:
  /servers/{serverId}/memberships:
    get:
      summary: List memberships for a server
      operationId: listMemberships
      tags: [memberships]
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MembershipSummary'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    MembershipSummary:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
          format: uuid
        role:
          type: string
        joinedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
