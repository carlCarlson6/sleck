# Sleck API contract — Servers
#
# Domain: servers
# Version: 0.1.0
# Last updated by: Isabel
#
openapi: 3.0.3
info:
  title: Sleck Servers API
  version: 0.1.0
  description: |
    Baseline contract for server management endpoints.
    To be extended with server CRUD and listing as flows are implemented.
paths:
  /servers:
    get:
      summary: List servers for current user
      operationId: listServers
      tags: [servers]
      responses:
        '200':
          description: List of servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServerSummary'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new server
      operationId: createServer
      tags: [servers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServerInput'
      responses:
        '201':
          description: Server created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerSummary'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ServerSummary:
      type: object
      required:
        - id
        - name
        - ownerId
        - visibility
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        ownerId:
          type: string
          format: uuid
        visibility:
          type: string
          enum: [public, private]
        createdAt:
          type: string
          format: date-time
    CreateServerInput:
      type: object
      required:
        - name
        - visibility
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        visibility:
          type: string
          enum: [public, private]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
