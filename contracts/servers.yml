# Sleck API contract — Servers
#
# Domain: servers
# Version: 0.1.0
# Last updated by: Isabel
#
openapi: 3.0.3
info:
  title: Sleck Servers API
  version: 0.1.0
  description: |
    Baseline contract for server management endpoints.
    To be extended with server CRUD and listing as flows are implemented.
paths:
  /servers:
    get:
      summary: List servers for current user
      operationId: listServers
      tags: [servers]
      responses:
        '200':
          description: List of servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServerSummary'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ServerSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        ownerId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
