services:
  db:
    image: postgres:15-alpine
    container_name: sleck-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - sleck-db-data:/var/lib/postgresql/data

  backend:
    build:
      context: ../be
    container_name: sleck-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "3001:3001"
    volumes:
      - ../be:/app
      - /app/node_modules
    depends_on:
      - db
    command: npm run dev

  frontend:
    build:
      context: ../fe
    container_name: sleck-frontend
    restart: unless-stopped
    environment:
      VITE_BACKEND_BASE_URL: ${VITE_BACKEND_BASE_URL}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    ports:
      - "5173:5173"
    volumes:
      - ../fe:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  sleck-db-data:
    driver: local
