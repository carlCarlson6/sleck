version: '3.9'
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sleck
      POSTGRES_PASSWORD: sleckdev
      POSTGRES_DB: sleck
    ports:
      - "5432:5432"
    volumes:
      - sleck-db-data:/var/lib/postgresql/data

  backend:
    build:
      context: ../be
      dockerfile: ../infrastructure/be.Dockerfile
    working_dir: /app
    environment:
      PORT: 4000
      NODE_ENV: development
      DATABASE_URL: postgres://sleck:sleckdev@db:5432/sleck
    ports:
      - "4000:4000"
    volumes:
      - ../be:/app
      - /app/node_modules
    depends_on:
      - db


  frontend:
    build:
      context: ../fe
      dockerfile: ../infrastructure/fe.Dockerfile
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    volumes:
      - ../fe:/app
      - /app/node_modules
    depends_on:
      - backend

    command: npm run dev -- --host 0.0.0.0

volumes:
  sleck-db-data:
