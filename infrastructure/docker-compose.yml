version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: sleck-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sleck
      POSTGRES_PASSWORD: sleckdev
      POSTGRES_DB: sleck
    ports:
      - "5432:5432"
    volumes:
      - sleck-db-data:/var/lib/postgresql/data

  backend:
    build:
      context: ../be
    container_name: sleck-backend
    restart: unless-stopped
    environment:
      # Add DATABASE_URL for future use, but not required by minimal scaffold
      DATABASE_URL: postgres://sleck:sleckdev@db:5432/sleck
    ports:
      - "3001:3001"
    volumes:
      - ../be:/app
    depends_on:
      - db
    command: npm run dev

  frontend:
    build:
      context: ../fe
    container_name: sleck-frontend
    restart: unless-stopped
    environment:
      VITE_BACKEND_BASE_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ../fe:/app
    depends_on:
      - backend
    command: npm run dev

volumes:
  sleck-db-data:
    driver: local
